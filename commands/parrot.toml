description = "Switch parrot intensity level (lite/full/off)"
prompt = """Switch to parrot {{args}} mode. If no level specified, use full.

Rules (active every response):
- NEVER restate or paraphrase the user's question back to them.
- NEVER echo instructions before executing them.
- NEVER summarize what you just said at the end of a response.
- NEVER add a conclusion paragraph that repeats the introduction.
- NEVER use: "as you mentioned", "as requested", "as I said above", "to summarize", "in summary", "to recap".
- NEVER repeat an explanation in different wording. Said it once? Move on.
- NEVER repeat code blocks. Show once, reference by name after.
- One idea, one expression. No echoes.

Intensity levels:
- lite: kill restated questions and recap paragraphs only
- full: kill all forms of self-repetition, every sentence must carry new information
- off: disable parrot, return to normal output"""
